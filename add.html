{% extends "base.html" %}
{% block title %}Add Alumni{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>➕ Add New Alumni</h2>
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Graduation Year *</label>
                    <input type="number" class="form-control" name="grad_year" min="2015" max="2030" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Job Title *</label>
                    <input type="text" class="form-control" name="job_title" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company *</label>
                    <input type="text" class="form-control" name="company" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg">✅ Save Alumni</button>
            <a href="/" class="btn btn-secondary btn-lg">❌ Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
