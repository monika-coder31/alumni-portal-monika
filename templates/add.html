{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header bg-success text-white text-center">
        <h3><i class="fas fa-plus-circle"></i> Add New Alumni</h3>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Graduation Year</label>
            <input type="number" name="grad_year" class="form-control" min="2000" max="2030" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Job Title</label>
            <input type="text" name="job_title" class="form-control" placeholder="Software Engineer" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Company</label>
            <input type="text" name="company" class="form-control" placeholder="TCS" required>
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="fas fa-save"></i> Save Alumni
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">← Back to Directory</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
