{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center">
  <div class="col-md-5">
    <div class="card shadow-lg border-0">
      <div class="card-body p-5">
        <div class="text-center mb-5">
          <i class="fas fa-university fa-4x text-primary mb-3"></i>
          <h2>College Admin Portal</h2>
        </div>
        
        <form method="POST">
          <div class="mb-4">
            abel class="form-label fw-bold">College Email</label>
            <input type="email" name="email" class="form-control form-control-lg" 
                   placeholder="student@college.edu" required>
            <small class="text-muted">Use your college email (@college.edu / @student.ac.in)</small>
          </div>
          <div class="mb-4">
            abel class="form-label fw-bold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" 
                   placeholder="college123" required>
            <small class="text-muted d-block">Common password: <strong>college123</strong></small>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 py-3">
            🚀 Enter Dashboard
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
