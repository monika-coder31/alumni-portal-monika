{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body text-center p-5">
        <h1 class="display-4 mb-4"><i class="fas fa-unlock text-primary"></i></h1>
        <h2>Admin Login</h2>
        <p class="text-muted mb-4">Enter admin password to access dashboard</p>
        
        <form method="POST">
          <div class="mb-4">
            <input type="password" name="password" class="form-control form-control-lg text-center" placeholder="ai123" required>
            <small class="text-muted mt-2 d-block">Password: <strong>ai123</strong></small>
          </div>
          <button type="submit" class="btn btn-primary btn-lg px-5">🚀 Enter Portal</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
