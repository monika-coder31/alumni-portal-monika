<!DOCTYPE html>
<html>
<head>
<title>Edit Alumni</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
form {max-width:500px; margin:50px auto; padding:30px; border:1px solid #ddd; border-radius:10px}
input[type="text"], input[type="number"] {width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:5px}
button {background:#FF9800; color:white; padding:12px 30px; border:none; border-radius:5px; cursor:pointer; font-size:16px}
button:hover {background:#F57C00}
.delete-btn {background:#f44336 !important}
a {color:#2196F3; text-decoration:none}
</style>
</head>
<body>
<h1 style="text-align:center">✏️ Edit Alumni: {{alumni.name}}</h1>
<form method="POST">
  <label>Name:</label><br>
  <input type="text" name="name" value="{{alumni.name}}" required><br>
  
  <label>Graduation Year:</label><br>
  <input type="number" name="grad_year" value="{{alumni.grad_year}}" min="2000" max="2030" required><br>
  
  <label>Job Title:</label><br>
  <input type="text" name="job_title" value="{{alumni.job_title}}" required><br>
  
  <label>Company:</label><br>
  <input type="text" name="company" value="{{alumni.company}}" required><br>
  
  <br>
  <button type="submit">💾 Update Alumni</button>
  <br><br>
  <a href="/">← Back to Directory</a>
</form>
</body>
</html>
