<!DOCTYPE html>
<html>
<head>
<title>{% block title %}Alumni Portal{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh}
.navbar {background: rgba(255,255,255,0.95)!important; backdrop-filter:blur(10px)}
.card {border:none; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.btn {border-radius:25px; font-weight:600}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="{{ url_for('index') }}">
      <i class="fas fa-graduation-cap text-primary"></i> Alumni Portal
    </a>
    {% if session.logged_in %}
    <div class="navbar-nav ms-auto">
      <a class="nav-link btn btn-outline-primary btn-sm me-2" href="{{ url_for('add') }}">➕ Add</a>
      <a class="nav-link btn btn-outline-success btn-sm me-2" href="{{ url_for('export') }}">📥 Export</a>
      <a class="nav-link btn btn-outline-warning btn-sm" href="{{ url_for('logout') }}">🚪 Logout</a>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container mt-5">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
